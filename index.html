<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijes Tour</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; }
#mapa { height:100vh; }
#panel {
  position:absolute;
  bottom:0;
  width:100%;
  background:white;
  padding:15px;
  font-size:18px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="mapa"></div>

<div id="panel">
  <div id="texto">Cargando ubicación...</div>
  <button onclick="siguiente()">Siguiente</button>
</div>

<script>

let mapa = L.map('mapa').setView([3.7001,-76.4427],17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

const murales = [
  {n:"Mural 1", lat:3.7001198, lng:-76.4427437},
  {n:"Mural 2", lat:3.6998287, lng:-76.4426877}
];

let indice = 0;
let marcador = null;

function actualizar(lat, lng){

  let destino = murales[indice];

  document.getElementById("texto").innerHTML =
    "Dirígete a: " + destino.n;

  if(marcador) mapa.removeLayer(marcador);

  marcador = L.marker([destino.lat, destino.lng]).addTo(mapa);

  mapa.setView([lat, lng], 17);
}

function siguiente(){
  indice++;
  if(indice >= murales.length){
    document.getElementById("texto").innerHTML = "Recorrido terminado";
  }
}

navigator.geolocation.watchPosition(pos=>{
  actualizar(pos.coords.latitude, pos.coords.longitude);
},
err=>{
  document.getElementById("texto").innerHTML = "Activa ubicación";
});

</script>

</body>
</html>
